<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local LaTeX</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <!-- Floating search bar (outside editor pane) -->
  <div id="search-bar">
    <input type="text" id="search-input" placeholder="Find in editor...">
    <button id="search-prev-btn" title="Previous match">▲</button>
    <button id="search-next-btn" title="Next match">▼</button>
    <label><input type="checkbox" id="search-case-sensitive"> Aa</label>
    <button id="search-close-btn">✕</button>
  </div>

  <div id="toolbar">
    <button id="compile-btn">Compile</button>
    <span id="status"></span>
    <button id="download-btn" disabled>Download PDF</button>
    <button id="new-project-btn">New Project</button>
    <button id="search-btn">🔍 Search</button>
    <button id="toggle-files-btn">Files ▸</button>
  </div>
  <div id="main">
    <div id="files-panel" class="collapsed">
      <div id="files-header">
        <span id="project-name">No project</span>
        <div>
          <button id="rename-project-btn" title="Rename project">✎</button>
          <button id="close-files-btn">✕</button>
        </div>
      </div>
      <div id="folder-creation">
        <input type="text" id="new-folder-name" placeholder="New folder name">
        <button id="create-folder-btn">+</button>
      </div>
      <div id="files-upload">
        <input type="file" id="file-input" multiple>
        <button id="upload-btn">Upload</button>
      </div>
      <div id="file-tree"></div>
    </div>
    <div id="preview-pane">
      <iframe id="pdf-frame" src="" width="100%" height="100%"></iframe>
    </div>
    <div id="editor-pane">
      <textarea id="editor"></textarea>
    </div>
  </div>
  <div id="log"></div>

  <!-- Only one CodeMirror and the searchcursor addon -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/stex/stex.min.js"></script>
  <script src="/static/script.js"></script>
</body>
</html>
